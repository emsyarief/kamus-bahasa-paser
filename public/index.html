<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Kamus Bahasa Paser–Indonesia statis ringan." />
    <title>Kamus Bahasa Paser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Kamus digital</p>
        <h1 id="page-title">Bahasa Paser ↔ Indonesia</h1>
        <p class="lede">Cari kata Paser atau arti Indonesia dari data JSON lokal.</p>
      </section>

      <section class="panel search-panel" aria-label="Pencarian kamus">
        <label for="searchInput">Cari entri</label>
        <div class="search-row">
          <input id="searchInput" type="search" autocomplete="off" placeholder="Mis. aba, baik, rumah..." />
          <button id="clearSearch" type="button">Bersihkan</button>
        </div>
        <div class="meta-row" aria-live="polite">
          <span id="entryCount">Memuat data…</span>
        </div>
      </section>

      <section id="status" class="status" role="status"></section>
      <section id="results" class="results" aria-label="Daftar entri"></section>

    </main>

    <template id="entryTemplate">
      <article class="card">
        <div class="card-head">
          <div>
            <h2 class="headword"></h2>
            <p class="subline"></p>
          </div>
          <span class="badge"></span>
        </div>
        <dl class="fields"></dl>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
    <script src="./gsap-effects.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
